<head>

  <meta http-equiv="X-UA-Compatible" content="IE=edge">

  <meta name="robots" content="index, follow">

  <meta property="og:type" content="website">
  <meta property="og:url" content="https://www.ciom/">
  <meta property="og:title" content="Citi.com: Online Banking, Mortgages, Personal Loans, Investing">
  <meta property="og:description" content="Citi offers online banking services including checking and savings accounts, mortgages, personal loans, credit cards, and investment options.">
  <meta property="og:image" content="/og-image.jpg">
  
  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image">
  <meta property="twitter:url" content="https://www.c.com/">
  <meta property="twitter:title" content="Citi.com: Online Banking, Mortgages, Personal Loans, Investing">
  <meta property="twitter:description" content="Citi offers online banking services including checking and savings accounts, mortgages, personal loans, credit cards, and investment options.">
  <meta property="twitter:image" content="/twitter-image.jpg">
  
  <!-- Theme Color -->
  <meta name="theme-color" content="#003B6F">
  <meta name="msapplication-TileColor" content="#003B6F">
  
  <!-- Apple Touch Icon -->
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  
  <!-- Favicon -->
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://uploadthingy.s3.us-west-1.amazonaws.com">
  
  <!-- DNS Prefetch -->
  <link rel="dns-prefetch" href="https://fonts.googleapis.com">
  
  <style>
    /* Critical CSS for initial render */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      background-color: #f9fafb;
    }
    
    #root {
      min-height: 100vh;
    }
    
    /* Loading spinner */
    .loading-spinner {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: linear-gradient(to bottom, #2B6FD8, #1E5BB8);
    }
    
    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid rgba(255, 255, 255, 0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    /* Skip to main content link for accessibility */
    .skip-to-main {
      position: absolute;
      top: -40px;
      left: 0;
      background: #003B6F;
      color: white;
      padding: 8px 16px;
      text-decoration: none;
      z-index: 100;
      border-radius: 0 0 4px 0;
    }
    
    .skip-to-main:focus {
      top: 0;
    }
  </style>
</head>
<body>
  <noscript>
    <div style="padding: 20px; text-align: center; background: #fff3cd; color: #856404;">
      <strong>JavaScript Required:</strong> You need to enable JavaScript to run this application.
    </div>
  </noscript>
  
  <!-- Skip to main content for accessibility -->
  <a href="#main-content" class="skip-to-main">Skip to main content</a>
  
  <div id="root">
    <div class="loading-spinner">
      <div class="spinner" role="status" aria-label="Loading"></div>
    </div>
  </div>
</body>
</html>
